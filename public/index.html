<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MANTENIMIENTO IBS</title>
<style>
:root{
  --orange:#ff6a00;
  --orange2:#ff8a2a;
  --black:#101010;
  --dark:#1f2328;
  --panel:#ffffff;
  --line:#d8dde3;
  --bg:#eef1f4;
  --green:#0f8a4b;
  --blue:#1769aa;
  --red:#b42318;
  --yellow:#b7791f;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--dark)}
button{border:0;border-radius:14px;padding:12px 16px;font-weight:900;font-size:15px;cursor:pointer;margin:4px}
.btn-orange{background:var(--orange);color:white}.btn-dark{background:var(--dark);color:white}.btn-green{background:var(--green);color:white}.btn-blue{background:var(--blue);color:white}.btn-red{background:var(--red);color:white}.btn-gray{background:#666;color:white}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font-size:16px;background:white}
textarea{min-height:90px;resize:vertical}
label{font-weight:900;font-size:13px;color:#555;display:block;margin:10px 0 5px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.muted{color:#666;font-size:13px}
.login-page{
  min-height:100vh;
  display:grid;
  grid-template-columns:1.1fr .9fr;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,106,0,.35), transparent 28%),
    linear-gradient(90deg,rgba(0,0,0,.92),rgba(0,0,0,.78),rgba(0,0,0,.46)),
    url("https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?auto=format&fit=crop&w=1800&q=80");
  background-size:cover;background-position:center;
}
.login-left{display:flex;flex-direction:column;justify-content:center;padding:70px;color:white;position:relative}
.ibs-logo-wrap{background:white;border:4px solid var(--orange);border-radius:18px;padding:10px 18px;width:max-content;max-width:390px;box-shadow:0 18px 55px #0008;margin-bottom:34px}
.ibs-logo-wrap img{display:block;width:290px;max-width:75vw;height:auto}
.login-title{font-size:56px;line-height:1;margin:0 0 16px;font-weight:900;letter-spacing:-1.5px}
.login-title strong{color:var(--orange)}
.login-subtitle{font-size:20px;color:#e5e5e5;max-width:720px;line-height:1.48}
.machine-strip{display:grid;grid-template-columns:repeat(4,minmax(110px,1fr));gap:12px;max-width:760px;margin-top:28px}
.machine-card{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(5px);border-radius:18px;padding:16px;box-shadow:0 14px 40px #0005}
.machine-card .ico{font-size:34px;display:block;margin-bottom:8px}.machine-card b{display:block;color:white}.machine-card small{display:block;color:#ccc;margin-top:5px}
.login-right{display:flex;align-items:center;justify-content:center;padding:30px;z-index:1}
.login-card{width:100%;max-width:430px;background:rgba(255,255,255,.97);border-radius:28px;padding:30px;box-shadow:0 26px 80px #000a;border-top:9px solid var(--orange)}
.system-online{display:flex;align-items:center;gap:8px;font-size:13px;color:#0f8a4b;font-weight:900;margin-bottom:14px}
.dot-online{width:10px;height:10px;border-radius:50%;background:#0f8a4b;box-shadow:0 0 0 5px rgba(15,138,75,.12)}
.login-card h2{margin:0;font-size:30px}.login-card p{color:#666;margin:8px 0 20px}.login-card input{background:#f7f7f7;border:1px solid #ddd}.login-card button{width:100%;margin:14px 0 0;font-size:17px;padding:14px}.login-footer{text-align:center;margin-top:18px;font-size:12px;color:#777}
header{background:#111;color:white;padding:14px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10;border-bottom:4px solid var(--orange);box-shadow:0 7px 22px #0003}
.header-logo{background:white;border:3px solid var(--orange);border-radius:14px;padding:6px 10px}.header-logo img{width:190px;max-width:45vw;display:block}.header-title h1{margin:0;font-size:24px}.header-title div{font-size:13px;color:#bbb}.topActions{margin-left:auto;display:flex;flex-wrap:wrap;gap:5px}
main{padding:18px;max-width:1250px;margin:auto}.hero{background:linear-gradient(120deg,#111 0%,#222 46%,rgba(255,106,0,.88) 100%);color:white;border-radius:26px;padding:24px;margin-bottom:16px;box-shadow:0 13px 35px #0002;overflow:hidden;position:relative}.hero:after{content:"⚙️";position:absolute;right:35px;top:15px;font-size:120px;opacity:.12}.hero h2{margin:0 0 8px;font-size:32px}.hero p{margin:0;color:#e9e9e9}
.cards-machines{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.area-card{background:white;border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 6px 18px #0001;border-left:7px solid var(--orange)}.area-card .ico{font-size:36px;margin-bottom:8px}.area-card b{display:block;font-size:17px}.area-card span{font-size:13px;color:#666}
.card{background:white;border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:16px;box-shadow:0 6px 18px #0001}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.kpi{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 6px 18px #0001}.kpi b{font-size:30px;display:block;color:var(--orange)}
.status{display:inline-block;color:white;border-radius:999px;padding:7px 10px;font-weight:900;font-size:12px}.Reportado{background:var(--red)}.Liberado{background:var(--green)}
table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top;font-size:14px}th{background:#f8fafc}.empty{padding:22px;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:18px;color:#666}
@media(max-width:950px){.login-page{grid-template-columns:1fr}.login-left{padding:35px 24px 10px}.login-title{font-size:40px}.login-subtitle{font-size:16px}.machine-strip{grid-template-columns:1fr 1fr}.cards-machines,.kpis,.grid,.grid3{grid-template-columns:1fr}.topActions{margin-left:0}header{align-items:flex-start;flex-wrap:wrap}}
</style>
</head>
<body>
<header id="mainHeader" style="display:none">
  <div class="header-logo"><img src="/logo-interbandas.png" alt="Interbandas" onerror="this.style.display='none'; this.parentNode.innerHTML='<b style=&quot;color:#ff6a00;font-size:24px&quot;>interbandas</b>'"></div>
  <div class="header-title"><h1>MANTENIMIENTO IBS</h1><div id="userLabel">Sistema interno</div></div>
  <div id="topActions" class="topActions"></div>
</header>
<main id="app"></main>
<script>
let me=null;let equiposCache=[];let ticketsCache=[];
async function api(url,opts={}){const r=await fetch(url,opts);if(!r.ok){let e=await r.text();throw new Error(e)}return r.headers.get("content-type")?.includes("json")?r.json():r.text()}
function fmt(d){return d?new Date(d).toLocaleString():""}function statusClass(s){return String(s||"").replaceAll(" ","")}
function salir(){me=null;localStorage.removeItem("usuarioIBS");login()}function guardarSesion(){localStorage.setItem("usuarioIBS",JSON.stringify(me))}
function cargarSesion(){try{const raw=localStorage.getItem("usuarioIBS");if(raw)me=JSON.parse(raw)}catch(e){localStorage.removeItem("usuarioIBS")}}
function nav(){document.getElementById("mainHeader").style.display="flex";document.getElementById("topActions").innerHTML=`<button class="btn-gray" onclick="render()">Actualizar</button><button class="btn-dark" onclick="location.href='/api/export'">Exportar CSV</button><button class="btn-red" onclick="salir()">Salir</button>`}
function login(){document.getElementById("mainHeader").style.display="none";const app=document.getElementById("app");app.style.maxWidth="none";app.style.padding="0";app.innerHTML=`
<section class="login-page">
  <div class="login-left">
    <div class="ibs-logo-wrap"><img src="/logo-interbandas.png" alt="Interbandas" onerror="this.style.display='none'; this.parentNode.innerHTML='<b style=&quot;color:#222;font-size:34px;font-style:italic&quot;>inter<span style=&quot;color:#ff6a00&quot;>bandas</span></b>'"></div>
    <h1 class="login-title">Sistema de <strong>Mantenimiento</strong> IBS</h1>
    <p class="login-subtitle">Control general de tickets, maquinaria, herramientas, tiempos muertos y reportes internos.</p>
    <div class="machine-strip">
      <div class="machine-card"><span class="ico">🏭</span><b>Maquinaria</b><small>Control de equipos industriales</small></div>
      <div class="machine-card"><span class="ico">🛠️</span><b>Herramientas</b><small>Inventario y seguimiento</small></div>
      <div class="machine-card"><span class="ico">📋</span><b>Mantenimiento</b><small>Tickets y fallas</small></div>
      <div class="machine-card"><span class="ico">📊</span><b>Control</b><small>Seguimiento y reportes</small></div>
    </div>
  </div>
  <div class="login-right">
    <div class="login-card">
      <div class="system-online"><span class="dot-online"></span>Sistema conectado a Neon</div>
      <h2>Ingresar</h2><p>Acceso interno para personal autorizado.</p>
      <label>Usuario</label><input id="u" placeholder="Usuario" value="admin">
      <label>Contraseña</label><input id="p" type="password" placeholder="Contraseña" value="1234">
      <button class="btn-orange" onclick="doLogin()">Entrar al sistema</button>
      <div class="login-footer">Interbandas · Mantenimiento IBS<br>Base de datos segura en Neon</div>
    </div>
  </div>
</section>`}
async function doLogin(){try{const r=await api("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u.value,password:p.value})});me=r.user;guardarSesion();render()}catch(e){alert("No entró: "+e.message)}}
async function cargarDatos(){equiposCache=await api("/api/equipos");ticketsCache=await api("/api/tickets")}
async function render(){if(!me){login();return}nav();document.getElementById("userLabel").textContent=`${me.name||me.username} · ${me.role||""}`;const app=document.getElementById("app");app.style.maxWidth="1250px";app.style.padding="18px";await cargarDatos();app.innerHTML=`
<section class="hero"><h2>Panel de mantenimiento industrial</h2><p>Equipos, herramientas, reportes y seguimiento de fallas en tiempo real.</p></section>
<section class="cards-machines">
  <div class="area-card"><div class="ico">🏭</div><b>Maquinaria</b><span>Control de equipos industriales</span></div>
  <div class="area-card"><div class="ico">🛠️</div><b>Herramientas</b><span>Inventario y uso de herramientas</span></div>
  <div class="area-card"><div class="ico">📋</div><b>Mantenimiento</b><span>Gestión de tickets y fallas</span></div>
  <div class="area-card"><div class="ico">📊</div><b>Control</b><span>Seguimiento y reportes</span></div>
</section>
${dashboard()}${ticketCard()}${equiposCard()}${tablaTickets()}`}
function dashboard(){const total=ticketsCache.length;const abiertos=ticketsCache.filter(t=>t.estado!=="Liberado").length;const equipos=equiposCache.length;const reportados=ticketsCache.filter(t=>t.estado==="Reportado").length;return `<div class="kpis"><div class="kpi"><b>${total}</b>Tickets totales</div><div class="kpi"><b>${abiertos}</b>Tickets abiertos</div><div class="kpi"><b>${equipos}</b>Equipos/herramientas</div><div class="kpi"><b>${reportados}</b>Reportados</div></div>`}
function ticketCard(){return `<div class="card"><h2>Reportar falla</h2><div class="grid"><div><label>Equipo / herramienta</label><select id="equipo">${equiposCache.map(e=>`<option value="${e.numero}|${e.descripcion}|${e.area||""}">${e.numero} · ${e.descripcion}</option>`).join("")}</select></div><div><label>Reporta</label><input id="reporta" placeholder="Nombre de quien solicita"></div></div><label>Falla detectada</label><textarea id="falla" placeholder="Describe la falla..."></textarea><button class="btn-orange" onclick="crearTicket()">Crear ticket</button></div>`}
async function crearTicket(){try{const sel=document.getElementById("equipo").value.split("|");await api("/api/tickets",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({equipo:sel[0],descripcion:sel[1],area:sel[2],reporta:document.getElementById("reporta").value,falla:document.getElementById("falla").value})});alert("Ticket creado");render()}catch(e){alert("Error al crear ticket: "+e.message)}}
function equiposCard(){return `<div class="card"><h2>Agregar máquina / herramienta</h2><div class="grid"><input id="numeroEquipo" placeholder="Número de equipo"><input id="descripcionEquipo" placeholder="Descripción"><input id="areaEquipo" placeholder="Área"><select id="tipoEquipo"><option>Máquina</option><option>Herramienta</option><option>Equipo</option></select></div><button class="btn-orange" onclick="agregarEquipo()">Agregar equipo</button></div>`}
async function agregarEquipo(){try{await api("/api/equipos",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({numero:document.getElementById("numeroEquipo").value,descripcion:document.getElementById("descripcionEquipo").value,area:document.getElementById("areaEquipo").value,tipo:document.getElementById("tipoEquipo").value})});alert("Equipo agregado");render()}catch(e){alert("Error al agregar equipo: "+e.message)}}
function tablaTickets(){if(!ticketsCache.length)return `<div class="card"><h2>Tickets</h2><div class="empty">Sin tickets todavía.</div></div>`;return `<div class="card"><h2>Tickets registrados</h2><table><thead><tr><th>Ticket</th><th>Equipo</th><th>Área</th><th>Falla</th><th>Estado</th><th>Creado</th></tr></thead><tbody>${ticketsCache.map(t=>`<tr><td><b>${t.id}</b></td><td><b>${t.equipo||""}</b><br>${t.descripcion||""}</td><td>${t.area||""}</td><td>${t.falla||""}<br><span class="muted">Reporta: ${t.reporta||""}</span></td><td><span class="status ${statusClass(t.estado)}">${t.estado||"Reportado"}</span></td><td>${fmt(t.creado)}</td></tr>`).join("")}</tbody></table></div>`}
cargarSesion();if(me)render();else login();
</script>
</body>
</html>
