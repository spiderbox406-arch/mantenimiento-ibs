
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MANTENIMIENTO IBS</title>
<style>
:root{--orange:#ff6a00;--dark:#242424;--line:#d8dde3;--bg:#eef1f4;--green:#0f8a4b;--blue:#1769aa;--red:#b42318;--yellow:#b7791f}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--dark)}
header{background:white;border-bottom:1px solid var(--line);padding:16px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:3}
.logo{width:56px;height:56px;border:4px solid var(--orange);border-radius:14px;display:grid;place-items:center;font-weight:900;color:var(--orange)}
main{padding:18px;max-width:1250px;margin:auto}.card{background:white;border:1px solid var(--line);border-radius:22px;padding:18px;margin-bottom:16px;box-shadow:0 6px 18px #0001}
button{border:0;border-radius:14px;padding:12px 16px;font-weight:900;font-size:15px;cursor:pointer;margin:4px}.btn-orange{background:var(--orange);color:white}.btn-dark{background:var(--dark);color:white}.btn-green{background:var(--green);color:white}.btn-blue{background:var(--blue);color:white}.btn-red{background:var(--red);color:white}.btn-gray{background:#666;color:white}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font-size:16px;background:white}textarea{min-height:80px}
label{font-weight:900;font-size:13px;color:#555;display:block;margin:10px 0 5px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.status{display:inline-block;color:white;border-radius:999px;padding:7px 10px;font-weight:900;font-size:12px}.Reportado{background:var(--red)}.Asignado{background:var(--yellow)}.EnAtencion{background:var(--blue)}.PendienteValidacion{background:#6b46c1}.Devuelto{background:#97266d}.Liberado{background:var(--green)}
table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top;font-size:14px}th{background:#f8fafc}.alert{border:2px solid var(--orange);background:#fff5e8;border-radius:18px;padding:16px;margin-bottom:14px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.kpi{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:16px}.kpi b{font-size:28px;display:block}
.photo{height:62px;border-radius:8px;margin:4px;border:1px solid var(--line)}.muted{color:#666;font-size:13px}.topActions{margin-left:auto}
@media(max-width:800px){.grid,.grid3,.kpis{grid-template-columns:1fr} table{font-size:12px} header{align-items:flex-start}.topActions{margin-left:0}}
</style>
</head>
<body>
<header><div class="logo">IBS</div><div><h1 style="margin:0">MANTENIMIENTO IBS</h1><div id="userLabel" class="muted">Sistema interno</div></div><div id="topActions" class="topActions"></div></header>
<main id="app"></main>
<script>
let me=null, boot=null;
async function api(url,opts={}){const r=await fetch(url,opts); if(!r.ok){let e=await r.text(); throw new Error(e)} return r.headers.get("content-type")?.includes("json")?r.json():r.text();}
function fmt(d){return d?new Date(d).toLocaleString():""}function min(a,b){return a&&b?Math.round((new Date(b)-new Date(a))/60000):""}
function stClass(s){return s.replaceAll(" ","").replace("atención","Atencion").replace("validación","Validacion")}
function msgWhats(t){return encodeURIComponent(`Alerta mantenimiento\n\nTicket: ${t.id}\nEquipo: ${t.equipo}\nÁrea: ${t.area}\nFalla: ${t.falla}\nEstado: ${t.estado}\nTécnico: ${t.tecnicoName||"Sin asignar"}\nHora: ${fmt(t.creado)}`)}
function waNumberFor(t){ if(t.tecnicoUsername && boot.config.whatsappTecnicos?.[t.tecnicoUsername]) return boot.config.whatsappTecnicos[t.tecnicoUsername]; return boot.config.whatsappGerente || ""; }
function abrirWA(t){let num=waNumberFor(t).replace(/[^0-9]/g,""); if(!num){alert("Falta configurar WhatsApp en ADMIN");return} window.open(`https://wa.me/${num}?text=${msgWhats(t)}`,"_blank")}
function nav(){document.getElementById("topActions").innerHTML=`<button class="btn-gray" onclick="render()">Actualizar</button><button class="btn-dark" onclick="location.href='/api/export'">Exportar CSV</button><button class="btn-red" onclick="salir()">Salir</button>`}
function salir(){me=null;boot=null;document.getElementById("topActions").innerHTML="";document.getElementById("userLabel").textContent="Sistema interno";login()}
async function login(){document.getElementById("app").innerHTML=`<div class="card"><h2>Ingresar</h2><div class="grid"><div><label>Usuario</label><input id="u" value="admin"></div><div><label>Contraseña</label><input id="p" type="password" value="1234"></div></div><button class="btn-orange" onclick="doLogin()">Entrar</button><p class="muted">Demo: admin/1234 · operaciones/1234 · gerente/1234 · juan/1234 · carlos/1234</p></div>`}
async function doLogin(){try{let r=await api("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u.value,password:p.value})});me=r.user;boot=await api("/api/bootstrap");document.getElementById("userLabel").textContent=`${me.name} · ${me.role}`;render()}catch(e){alert("No entró: "+e.message)}}
async function tickets(){return api(`/api/tickets?role=${me.role}&username=${me.username}`)}
async function render(){if(!me)return login();nav();boot=await api("/api/bootstrap"); if(me.role==="admin")return renderAdmin(); if(me.role==="operaciones")return renderOperaciones(); if(me.role==="gerente")return renderGerente(); if(me.role==="tecnico")return renderTecnico();}
async function renderOperaciones(){let t=await tickets();document.getElementById("app").innerHTML=`<div class="card"><h2>Operaciones · Reportar falla</h2><div class="grid"><div><label>Equipo</label><select id="equipo">${boot.equipos.map(e=>`<option value="${e.num}|${e.desc}|${e.area}|${e.tipo||""}">${e.num} · ${e.desc}</option>`).join("")}</select></div><div><label>Reporta</label><input id="reporta" placeholder="Nombre"></div><div><label>Prioridad</label><select id="prioridad"><option>Normal</option><option>Alta</option><option>Urgente</option></select></div><div><label>Fotos</label><input id="fotos" type="file" accept="image/*" multiple></div></div><label>Falla</label><textarea id="falla"></textarea><button class="btn-orange" onclick="crearTicket()">Enviar y alertar a mantenimiento</button></div><div class="card"><h2>Mis reportes / validación</h2>${tabla(t)}</div>`}
async function crearTicket(){let [equipo,desc,area,tipo]=document.getElementById("equipo").value.split("|");let fd=new FormData();fd.append("equipo",equipo);fd.append("descripcionEquipo",desc);fd.append("area",area);fd.append("tipoEquipo",tipo);fd.append("reporta",reporta.value);fd.append("prioridad",prioridad.value);fd.append("falla",falla.value);fd.append("createdBy",me.username);[...fotos.files].forEach(f=>fd.append("fotos",f));let t=await api("/api/tickets",{method:"POST",body:fd});abrirWA(t);render()}
async function renderGerente(){let t=await tickets();let nuevos=t.filter(x=>x.estado==="Reportado");document.getElementById("app").innerHTML=`${nuevos.length?`<div class="alert"><h2>⚠️ Nuevos reportes: ${nuevos.length}</h2>${nuevos.map(x=>`<b>${x.equipo}</b> · ${x.falla}<br>`).join("")}</div>`:""}<div class="card"><h2>Gerente MTTO · Asignar técnico</h2>${tabla(t)}</div>`}
async function renderTecnico(){let t=await tickets();let asignados=t.filter(x=>x.estado==="Asignado");document.getElementById("app").innerHTML=`${asignados.length?`<div class="alert"><h2>🔔 Alertas asignadas: ${asignados.length}</h2>${asignados.map(x=>`<b>${x.equipo}</b> · ${x.falla}<br>`).join("")}</div>`:""}<div class="card"><h2>Personal MTTO · Mis tickets</h2>${tabla(t)}</div>`}
async function renderAdmin(){let t=await tickets();let nuevos=t.filter(x=>x.estado==="Reportado");document.getElementById("app").innerHTML=`${nuevos.length?`<div class="alert"><h2>⚠️ Nuevos reportes: ${nuevos.length}</h2>${nuevos.map(x=>`<b>${x.equipo}</b> · ${x.falla}<br>`).join("")}</div>`:""}<div class="card"><h2>ADMIN · Control general</h2>${dashboard(t)}${tabla(t)}</div>${configCard()}${usuariosCard()}${equiposCard()}`}
function dashboard(t){let abiertos=t.filter(x=>x.estado!=="Liberado").length,lib=t.filter(x=>x.estado==="Liberado").length,muerto=t.reduce((s,x)=>s+(min(x.creado,x.liberado||new Date().toISOString())||0),0);return `<div class="kpis"><div class="kpi"><b>${t.length}</b>Total</div><div class="kpi"><b>${abiertos}</b>Abiertos</div><div class="kpi"><b>${lib}</b>Liberados</div><div class="kpi"><b>${muerto}</b>Min muertos</div></div><br>`}
function configCard(){return `<div class="card"><h2>Configurar WhatsApp</h2><label>Gerente / supervisor MTTO</label><input id="waGer" value="${boot.config.whatsappGerente||""}" placeholder="+52..."><h3>Técnicos</h3>${boot.tecnicos.map(te=>`<label>${te.name}</label><input id="wa_${te.username}" value="${boot.config.whatsappTecnicos?.[te.username]||""}" placeholder="+52...">`).join("")}<button class="btn-orange" onclick="guardarConfig()">Guardar WhatsApp</button></div>`}
function usuariosCard(){return `<div class="card"><h2>Usuarios</h2><div class="grid3"><input id="nu" placeholder="usuario"><input id="np" placeholder="contraseña"><select id="nr"><option value="operaciones">operaciones</option><option value="gerente">gerente</option><option value="tecnico">tecnico</option><option value="admin">admin</option></select></div><input id="nn" placeholder="nombre"><button class="btn-orange" onclick="addUser()">Agregar usuario</button><br><br>${boot.users.map(u=>`${u.name} · ${u.username} · ${u.role} ${u.username==="admin"?"":"<button class='btn-red' onclick=\"delUser('"+u.username+"')\">Borrar</button>"}<br>`).join("")}</div>`}
function equiposCard(){return `<div class="card"><h2>Máquinas / herramientas</h2><div class="grid"><input id="en" placeholder="Número equipo"><input id="ed" placeholder="Descripción"><input id="ea" placeholder="Área"><select id="et"><option>Máquina</option><option>Herramienta</option><option>Equipo</option></select></div><button class="btn-orange" onclick="addEquipo()">Agregar</button><br><br>${boot.equipos.map(e=>`${e.num} · ${e.desc} · ${e.area} <button class='btn-red' onclick="delEquipo('${e.num}')">Borrar</button><br>`).join("")}</div>`}
async function guardarConfig(){let cfg={whatsappGerente:waGer.value,whatsappTecnicos:{}};boot.tecnicos.forEach(te=>cfg.whatsappTecnicos[te.username]=document.getElementById("wa_"+te.username).value);await api("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(cfg)});alert("Guardado");render()}
async function addUser(){await api("/api/users",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:nu.value,password:np.value,role:nr.value,name:nn.value})});render()}
async function delUser(u){if(confirm("¿Borrar usuario "+u+"?")){await api("/api/users/"+u,{method:"DELETE"});render()}}
async function addEquipo(){await api("/api/equipos",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({num:en.value,desc:ed.value,area:ea.value,tipo:et.value})});render()}
async function delEquipo(n){if(confirm("¿Borrar equipo "+n+"?")){await api("/api/equipos/"+encodeURIComponent(n),{method:"DELETE"});render()}}
function tabla(t){if(!t.length)return"<p class='muted'>Sin tickets.</p>";return`<table><thead><tr><th>Ticket</th><th>Equipo</th><th>Estado</th><th>Tiempos</th><th>Acciones</th></tr></thead><tbody>${t.map(x=>`<tr><td><b>${x.id}</b><br>${fmt(x.creado)}<br>${x.prioridad}</td><td><b>${x.equipo}</b><br>${x.descripcionEquipo}<br>${x.area}<br>${x.falla}<br>${fotosHtml(x)}</td><td><span class="status ${stClass(x.estado)}">${x.estado}</span><br>Técnico: ${x.tecnicoName||"Sin asignar"}</td><td>Espera: ${min(x.creado,x.inicio||x.asignado)} min<br>Reparación: ${min(x.inicio,x.finTecnico)} min<br>Muerto total: ${min(x.creado,x.liberado||new Date().toISOString())} min</td><td>${acciones(x)}</td></tr>`).join("")}</tbody></table>`}
function fotosHtml(x){let f=[...(x.fotosReporte||[]),...(x.fotosTecnico||[])];return f.map(p=>`<img class="photo" src="${p}">`).join("")}
function acciones(x){let out=`<button class="btn-green" onclick='abrirWA(${JSON.stringify(x)})'>WhatsApp</button>`;if((me.role==="gerente"||me.role==="admin")&&x.estado==="Reportado"){out+=`<br><select id="tec_${x.id}">${boot.tecnicos.map(t=>`<option value="${t.username}">${t.name}</option>`).join("")}</select><button class="btn-blue" onclick="asignar('${x.id}')">Asignar y avisar</button>`}if((me.role==="tecnico"||me.role==="admin")&&x.estado==="Asignado")out+=`<br><button class="btn-blue" onclick="iniciar('${x.id}')">Iniciar atención</button>`;if((me.role==="tecnico"||me.role==="admin")&&x.estado==="En atención")out+=`<br><label>Diagnóstico</label><textarea id="diag_${x.id}"></textarea><label>Solución</label><textarea id="sol_${x.id}"></textarea><input id="ft_${x.id}" type="file" accept="image/*" multiple><button class="btn-green" onclick="terminar('${x.id}')">Terminar</button>`;if((me.role==="operaciones"||me.role==="admin")&&x.estado==="Pendiente validación")out+=`<br><button class="btn-green" onclick="liberar('${x.id}')">Liberar equipo</button><button class="btn-red" onclick="devolver('${x.id}')">Devolver</button>`;return out}
async function asignar(id){let tec=document.getElementById("tec_"+id).value;let t=await api(`/api/tickets/${id}/asignar`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tecnicoUsername:tec})});abrirWA(t);render()}
async function iniciar(id){await api(`/api/tickets/${id}/iniciar`,{method:"POST"});render()}
async function terminar(id){let fd=new FormData();fd.append("diagnostico",document.getElementById("diag_"+id).value);fd.append("solucion",document.getElementById("sol_"+id).value);[...document.getElementById("ft_"+id).files].forEach(f=>fd.append("fotos",f));await api(`/api/tickets/${id}/terminar`,{method:"POST",body:fd});render()}
async function liberar(id){await api(`/api/tickets/${id}/liberar`,{method:"POST"});render()}
async function devolver(id){await api(`/api/tickets/${id}/devolver`,{method:"POST"});render()}
login();
</script></body></html>
